apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pharma-auth-dev
  namespace: argocd
  labels:
    env: dev
    managed-by: terraform
spec:
  project: pharma
  source:
    repoURL: https://github.com/Nagendrappa/pharma-helm-charts.git
    targetRevision: HEAD
    path: pharma-service 
    helm:
      valueFiles:
        - envs/dev/global.yaml
        - envs/dev/values-auth-service.yaml
        - envs/dev/values-api-gateway.yaml
        - envs/dev/values-notification-service.yaml
        - envs/dev/values-pharma-ui.yaml
        - envs/dev/values-drug-catalog-service.yaml 
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
